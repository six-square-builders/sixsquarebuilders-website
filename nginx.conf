server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  etag on;

  location = / {
    try_files /index.html =404;
  }

  # Serve exported pages like /projects or /projects.html
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # Next static build artifacts are content-hashed, so they can be cached aggressively.
  location ^~ /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Cache media and other static assets from /public.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?|mp4|webm)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
